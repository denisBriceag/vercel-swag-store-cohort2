name: Health Check

on:
  deployment_status:

jobs:
  health-check:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment to warm up
        run: sleep 5

      - name: Check health
        id: health
        run: |
          curl --fail --silent --show-error \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}" \
            ${{ github.event.deployment_status.target_url }}/api/health

      - name: Roll back deployment on health failure.
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "Health check failed — rolling back deployment..."
          npx vercel@latest rollback ${{ github.event.deployment_status.target_url }} \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes
